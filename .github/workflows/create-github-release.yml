name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            echo "Unsupported tag: $TAG. Expected vX.Y.Z." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const releaseName = `SearchWeave v${process.env.RELEASE_VERSION}`
            const body = [
              "Automated umbrella release for SearchWeave packages.",
              '',
              `- Tag: \`${tag}\``,
              `- Version: \`${process.env.RELEASE_VERSION}\``,
              `- Commit: \`${context.sha}\``,
              '',
              'Published by workflows:',
              '- npm `@searchweave/client`',
              '- npm `@searchweave/cli`',
              '- PyPI `searchweave`',
              '',
              'This release also includes the Windows CLI executable asset.'
            ].join('\n')

            let existingRelease = null
            try {
              const lookup = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              existingRelease = lookup.data
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            if (existingRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease: false,
              })
              core.info(`Updated release for tag ${tag}`)
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease: false,
                generate_release_notes: true,
              })
              core.info(`Created release for tag ${tag}`)
            }

  build_cli_exe:
    needs: create_release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace "^v", ""
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build Windows CLI executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx --yes @yao-pkg/pkg@6 packages/cli --targets node20-win-x64 --output "dist/searchweave-cli-$env:VERSION-windows-x64.exe"

      - name: Smoke-test executable
        shell: pwsh
        run: .\dist\searchweave-cli-$env:VERSION-windows-x64.exe --help

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/searchweave-cli-${{ env.VERSION }}-windows-x64.exe
          overwrite_files: true
