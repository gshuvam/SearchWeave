name: Publish Python package

on:
  push:
    tags:
      - "py-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#py-v}" >> "$GITHUB_ENV"

      - name: Apply version to pyproject.toml
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          pyproject = Path("python/searchweave-py/pyproject.toml")
          lines = pyproject.read_text(encoding="utf-8").splitlines()
          out = []
          replaced = False
          for line in lines:
              if line.startswith("version = ") and not replaced:
                  out.append(f'version = "{version}"')
                  replaced = True
              else:
                  out.append(line)
          pyproject.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Run Python tests
        run: python -m unittest discover -s python/searchweave-py/tests -p "test_*.py"

      - name: Build package
        run: python -m build python/searchweave-py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/searchweave-py/dist